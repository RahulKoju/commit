services:
  db:
    image: postgres:16-alpine
    container_name: commit-postgres-db
    # ports:
    #   - "${DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - commit

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commit-backend
    ports:
      - "${PORT}:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT}
      - APP_ENV=${APP_ENV}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - JWT_EXPIRY_HOURS=${JWT_EXPIRY_HOURS}
      - JWT_EXPIRY_MINUTES=${JWT_EXPIRY_MINUTES}
      - DB_MAX_CONNS=${DB_MAX_CONNS}
      - DB_MIN_CONNS=${DB_MIN_CONNS}
      - DB_MAX_CONN_LIFETIME_MINUTES=${DB_MAX_CONN_LIFETIME_MINUTES}
      - DB_MAX_CONN_IDLE_MINUTES=${DB_MAX_CONN_IDLE_MINUTES}
      - FOCUS_DAILY_MINIMUM_MINUTES=${FOCUS_DAILY_MINIMUM_MINUTES}
      - LOGIN_RATE_LIMIT=${LOGIN_RATE_LIMIT}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN}
      - VITE_WEB_URL=${VITE_WEB_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - commit

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: http://localhost:8080
        VITE_WEB_URL: http://localhost:5173
        VITE_APP_URL: http://localhost:5174
    container_name: commit-web
    ports:
      - "5173:80"
    restart: always
    networks:
      - commit

  app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.app
      args:
        VITE_API_URL: http://localhost:8080
        VITE_WEB_URL: http://localhost:5173
        VITE_APP_URL: http://localhost:5174
    container_name: commit-app
    ports:
      - "5174:80"
    restart: always
    networks:
      - commit

volumes:
  postgres_data:

networks:
  commit:
    driver: bridge
