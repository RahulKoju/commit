apiVersion: v1
kind: Service

metadata:
  name: postgres
  namespace: commit

spec:
  clusterIP: None # makes it headless
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service

metadata:
  name: commit-postgres
  namespace: commit

spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
