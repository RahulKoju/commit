apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-web
  namespace: commit

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend-web

  template:
    metadata:
      labels:
        app: frontend-web

    spec:
      containers:
        - name: frontend-web
          image: rahulkoju/commit-web:e00e2780b6b6411440dc7db1535ab177c309ba48

          ports:
            - containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
