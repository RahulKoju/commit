nameOverride: ""
fullnameOverride: ""

# Run on worker node only
nodeSelector: &workerNodeSelector
  node-role.kubernetes.io/worker: "true"

# Prometheus
prometheus:
  prometheusSpec:
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
      fsGroup: 0
    nodeSelector: *workerNodeSelector
    retention: 15d
    retentionSize: "8GB"
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    additionalScrapeConfigs:
      - job_name: commit-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [commit]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: backend
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_port_number]
            regex: "8080"
            action: keep

# Alertmanager
alertmanager:
  alertmanagerSpec:
    nodeSelector: *workerNodeSelector
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
  config:
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "rahulkoju69@gmail.com"
      smtp_auth_username: "rahulkoju69@gmail.com"
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-secret/smtp_password
      smtp_require_tls: true
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: email
    receivers:
      - name: email
        email_configs:
          - to: "rahulkoju69@gmail.com"
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace"]

# Grafana
grafana:
  nodeSelector: *workerNodeSelector
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  persistence:
    enabled: true
    storageClassName: local-path
    size: 2Gi
  adminPassword: ""
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.commit.rahulkoju.com.np
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.commit.rahulkoju.com.np
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus

# node-exporter
nodeExporter:
  enabled: true

# kube-state-metrics
kubeStateMetrics:
  enabled: true

# Additional alert rules
additionalPrometheusRulesMap:
  commit-rules:
    groups:
      - name: commit.rules
        rules:
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace="commit"}[5m]) * 300 > 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is crash looping"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is restarting frequently"

          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled", namespace="commit"} == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} was OOMKilled"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} was killed due to OOM"

          - alert: NodeMemoryHigh
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node memory usage above 85%"
              description: "Node {{ $labels.instance }} memory usage is {{ $value }}%"

          - alert: NodeCPUHigh
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node CPU usage above 85%"
              description: "Node {{ $labels.instance }} CPU usage is {{ $value }}%"

          - alert: PVCUsageHigh
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} usage above 80%"
              description: "PVC {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value }}% full"

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas{namespace="commit"} != kube_deployment_status_available_replicas{namespace="commit"}
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Deployment {{ $labels.deployment }} has unavailable replicas"
              description: "Deployment {{ $labels.deployment }} in namespace {{ $labels.namespace }} has mismatched replicas"

          - alert: PostgresDown
            expr: kube_statefulset_status_ready_replicas{statefulset="postgres", namespace="commit"} < 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL StatefulSet has no ready replicas in namespace commit"

          - alert: HighErrorRate
            expr: rate(nginx_ingress_controller_requests{status=~"5.."}[5m]) / rate(nginx_ingress_controller_requests[5m]) * 100 > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP error rate"
              description: "HTTP 5xx error rate is {{ $value }}% over the last 5 minutes"
