# ── Prometheus ────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 3d
    retentionSize: "7GB"

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3 # EBS gp3 — no permission issues
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 8Gi

    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        cpu: 300m
        memory: 400Mi

    scrapeInterval: "60s"
    evaluationInterval: "60s"

    serviceMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - commit
            - monitoring

    podMonitorNamespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - commit
            - monitoring

  service:
    type: ClusterIP

# ── Alertmanager ──────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

    secrets:
      - alertmanager-email-secret

  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "REPLACE_WITH_FROM_EMAIL"
      smtp_auth_username: "REPLACE_WITH_FROM_EMAIL"
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-email-secret/smtp_auth_password
      smtp_require_tls: true

    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: "email"

      routes:
        - matchers:
            - severity="critical"
          receiver: "email"
          group_wait: 10s
          repeat_interval: 1h
        - matchers:
            - alertname="Watchdog"
          receiver: "null"

    receivers:
      - name: "null"
      - name: "email"
        email_configs:
          - to: "REPLACE_WITH_TO_EMAIL"
            send_resolved: true

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace"]

  service:
    type: ClusterIP

# ── Grafana ───────────────────────────────────
grafana:
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  persistence:
    enabled: true
    storageClassName: gp3 # EBS gp3
    accessModes: ["ReadWriteOnce"]
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    hosts:
      - grafana.commit.rahulkoju.com.np
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana.commit.rahulkoju.com.np

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false

  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: "Asia/Kathmandu"

  grafana.ini:
    server:
      domain: grafana.commit.rahulkoju.com.np
      root_url: "https://grafana.commit.rahulkoju.com.np"
    auth.anonymous:
      enabled: false

# ── Disable scrapers RKE doesn't expose ───────
kubeEtcd:
  enabled: false

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

# ── Keep enabled ──────────────────────────────
nodeExporter:
  enabled: true

kubelet:
  enabled: true

kubeStateMetrics:
  enabled: true

# ── Resource limits ───────────────────────────
prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
