---
- name: Install prerequisites for Docker
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: yes

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  shell: |
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker repository
  apt_repository:
    repo: >
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Get available Docker versions
  shell: apt-cache madison docker-ce | grep "27\.2\." | head -1 | awk '{print $3}'
  register: docker_version_string
  changed_when: false

- name: Install Docker Engine and plugins
  apt:
    name:
      - "docker-ce={{ docker_version_string.stdout }}"
      - "docker-ce-cli={{ docker_version_string.stdout }}"
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker service is enabled and running
  service:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
