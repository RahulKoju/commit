---
- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: false

- name: Disable swap permanently
  replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+.*)$'
    replace: '# \1'

- name: Load overlay module
  community.general.modprobe:
    name: overlay
    state: present

- name: Load br_netfilter module
  community.general.modprobe:
    name: br_netfilter
    state: present

- name: Persist modules across reboots
  copy:
    dest: /etc/modules-load.d/rke.conf
    content: |
      overlay
      br_netfilter

- name: Set sysctl params for kubernetes networking
  copy:
    dest: /etc/sysctl.d/99-rke.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl params immediately
  command: sysctl --system
  changed_when: false

- name: check if UFW is installed
  package_facts:

- name: Disable UFW
  service:
    name: ufw
    state: stopped
    enabled: false
  when: "'ufw' in ansible_facts.packages"
