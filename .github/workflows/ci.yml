name: CI Pipeline

on:
  push:
    branches:
      - main

    paths:
      - frontend/**
      - backend/**
      - infra/**
      - .github/workflows/ci.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push commit-web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile.web
          push: true
          tags: |
            rahulkoju/commit-web:${{ github.sha }}
            rahulkoju/commit-web:latest

          build-args: |
            VITE_API_URL=https://commit.rahulkoju.com.np
            VITE_WEB_URL=https://commit.rahulkoju.com.np
            VITE_APP_URL=https://app.commit.rahulkoju.com.np

      - name: Build and Push commit-app
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile.app
          push: true
          tags: |
            rahulkoju/commit-app:${{ github.sha }}
            rahulkoju/commit-app:latest

          build-args: |
            VITE_API_URL=https://app.commit.rahulkoju.com.np
            VITE_WEB_URL=https://commit.rahulkoju.com.np
            VITE_APP_URL=https://app.commit.rahulkoju.com.np

      - name: Build and Push commit-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            rahulkoju/commit-backend:${{ github.sha }}
            rahulkoju/commit-backend:latest

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|rahulkoju/commit-web:.*|rahulkoju/commit-web:${GITHUB_SHA}|g" infra/k8s/frontend/web/deployment.yaml
          sed -i "s|rahulkoju/commit-app:.*|rahulkoju/commit-app:${GITHUB_SHA}|g" infra/k8s/frontend/app/deployment.yaml
          sed -i "s|rahulkoju/commit-backend:.*|rahulkoju/commit-backend:${GITHUB_SHA}|g" infra/k8s/backend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add infra/k8s

          git diff --cached --quiet || git commit -m "ci: update image tags to ${GITHUB_SHA}"

          git push
