name: CI Pipeline

on:
  push:
    branches:
      - main

    paths:
      - frontend/**
      - backend/**
      - infra/k8s/**/*.yaml
      - .github/workflows/ci.yml
  workflow_dispatch:

permissions:
  contents: write # Allow git push
  security-events: write # needed to upload SARIF to the Security tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@e07451d2e059ed86c2870430ea286b3a9e0bf241
        with:
          cache: true
          version: v0.72.0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build commit-web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile.web
          push: false
          load: true
          tags: |
            rahulkoju/commit-web:${{ github.sha }}
            rahulkoju/commit-web:latest

          build-args: |
            VITE_API_URL=https://commit.rahulkoju.com.np
            VITE_WEB_URL=https://commit.rahulkoju.com.np
            VITE_APP_URL=https://app.commit.rahulkoju.com.np

      - name: Scan commit-web
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "rahulkoju/commit-web:${{ github.sha }}"
          skip-setup-trivy: true
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1" # Fails the step (and the whole job) if anything HIGH/CRITICAL and unfixed-per-ignore-file shows up.
          trivyignores: ".trivyignore"

      - name: Push commit-web
        run: docker push rahulkoju/commit-web:${{ github.sha }}
      - run: docker tag rahulkoju/commit-web:${{ github.sha }} rahulkoju/commit-web:latest && docker push rahulkoju/commit-web:latest

      - name: Build commit-app
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile.app
          push: false
          load: true
          tags: |
            rahulkoju/commit-app:${{ github.sha }}
            rahulkoju/commit-app:latest

          build-args: |
            VITE_API_URL=https://app.commit.rahulkoju.com.np
            VITE_WEB_URL=https://commit.rahulkoju.com.np
            VITE_APP_URL=https://app.commit.rahulkoju.com.np

      - name: Scan commit-app
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "rahulkoju/commit-app:${{ github.sha }}"
          skip-setup-trivy: true
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Push commit-app
        run: docker push rahulkoju/commit-app:${{ github.sha }}
      - run: docker tag rahulkoju/commit-app:${{ github.sha }} rahulkoju/commit-app:latest && docker push rahulkoju/commit-app:latest

      - name: Build commit-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: |
            rahulkoju/commit-backend:${{ github.sha }}
            rahulkoju/commit-backend:latest

      - name: Scan commit-backend
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "image"
          image-ref: "rahulkoju/commit-backend:${{ github.sha }}"
          skip-setup-trivy: true
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: ".trivyignore"

      - name: Push commit-backend
        run: docker push rahulkoju/commit-backend:${{ github.sha }}
      - run: docker tag rahulkoju/commit-backend:${{ github.sha }} rahulkoju/commit-backend:latest && docker push rahulkoju/commit-backend:latest

      - name: Generate SARIF report
        run: |
          trivy fs \
            --scanners misconfig,secret \
            --severity HIGH,CRITICAL \
            --ignorefile .trivyignore \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            ./infra

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on findings
        run: |
          trivy fs \
            --scanners misconfig,secret \
            --severity HIGH,CRITICAL \
            --ignorefile .trivyignore \
            --exit-code 1 \
            ./infra

      - name: Update Kubernetes manifest
        run: |
          sed -i "s|rahulkoju/commit-web:.*|rahulkoju/commit-web:${GITHUB_SHA}|g" infra/k8s/frontend/web/deployment.yaml
          sed -i "s|rahulkoju/commit-app:.*|rahulkoju/commit-app:${GITHUB_SHA}|g" infra/k8s/frontend/app/deployment.yaml
          sed -i "s|rahulkoju/commit-backend:.*|rahulkoju/commit-backend:${GITHUB_SHA}|g" infra/k8s/backend/deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add infra/k8s
          git diff --cached --quiet || git commit -m "ci: update image tags to ${GITHUB_SHA}"
          git push
