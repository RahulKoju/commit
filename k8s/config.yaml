apiVersion: v1
kind: ConfigMap

metadata:
  name: commit-config

data:
  DB_HOST: commit-postgres-db.commit.svc.cluster.local
  DB_PORT: 5432
  PORT: 8080
  APP_ENV: developement # this values needs to be changed it can be staging, production have to make it dynamic.
  ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174 # here too i think have to use the full dns name of the service.
